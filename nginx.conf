server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets by hash-friendly filenames
  location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    expires 1y;
    access_log off;
    try_files $uri =404;
  }

  # Let the SPA handle client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }
}
